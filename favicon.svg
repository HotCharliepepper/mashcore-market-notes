<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark navy background with rounded corners (browser-friendly) -->
  <rect width="64" height="64" rx="12" fill="#0B1220"/>
  <!-- Subtle border for crispness on light backgrounds -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" fill="none" stroke="#2A3859" stroke-width="1"/>
  <!-- Gold diamond (Mashcore brand mark) -->
  <g transform="translate(32, 32)">
    <!-- Outer diamond outline -->
    <path d="M 0 -18 L 14 0 L 0 18 L -14 0 Z" fill="none" stroke="#E9B949" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner solid diamond -->
    <path d="M 0 -7 L 7 0 L 0 7 L -7 0 Z" fill="#E9B949"/>
  </g>
</svg>
